<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | OP Supermarket</title>
  <style>
    :root {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --primary: 171 100% 41.2%; /* #14b8a6 matched with manifest */
      --card: 240 10% 10%;
      --muted-foreground: 240 5% 64.9%;
      --border: 240 5.9% 15%;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: hsl(240, 10%, 3.9%);
      color: hsl(0, 0%, 98%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      text-align: center;
    }

    .container {
      max-width: 440px;
      padding: 2.5rem;
      border-radius: 24px;
      background-color: hsl(240, 10%, 10%);
      border: 1px solid hsl(240, 5.9%, 15%);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      margin: 1.5rem;
    }

    .icon-wrapper {
      margin-bottom: 1.5rem;
      position: relative;
      display: inline-block;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }

    .badge {
      position: absolute;
      bottom: 0;
      right: 0;
      background-color: #ef4444;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.025em;
    }

    p {
      color: hsl(240, 5%, 64.9%);
      font-size: 0.95rem;
      line-height: 1.6;
      margin: 0 0 2rem 0;
    }

    .btn {
      display: inline-block;
      width: 100%;
      background-color: hsl(171, 100%, 41.2%);
      color: hsl(240, 10%, 3.9%);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.875rem 1.5rem;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3);
    }

    .btn:hover {
      opacity: 0.95;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-pill">
      <span>●</span> Connection Lost
    </div>
    <div class="icon-wrapper">
      <span class="icon">🛒</span>
      <div class="badge">!</div>
    </div>
    <h1>You are currently offline</h1>
    <p>We couldn't connect to OP Supermarket. Please check your internet connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
